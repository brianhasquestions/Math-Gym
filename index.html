<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>try { document.documentElement.setAttribute("data-theme", localStorage.getItem("mathgym.theme") || "light"); } catch (e) {}</script>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <title>MathGym — Train Applied Mathematics</title>
  <meta name="description" content="MathGym is an adaptive, mastery-based applied-math trainer — 12 subjects from algebra to cryptography. Every topic leads with where the math shows up in real life, then drills you until each skill is genuinely solid." />
  <meta name="theme-color" content="#f5f8fc" />
  <link rel="canonical" href="https://mathgym.io/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MathGym" />
  <meta property="og:title" content="MathGym — Train Applied Mathematics" />
  <meta property="og:description" content="An adaptive, mastery-based trainer for the math the real world actually uses — 12 subjects from algebra to cryptography." />
  <meta property="og:url" content="https://mathgym.io/" />
  <meta property="og:image" content="https://mathgym.io/assets/og.svg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="MathGym — Train Applied Mathematics" />
  <meta name="twitter:description" content="An adaptive, mastery-based trainer for the math the real world actually uses — 12 subjects from algebra to cryptography." />
  <meta name="twitter:image" content="https://mathgym.io/assets/og.svg" />
  <link rel="stylesheet" href="vendor/katex/katex.min.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
  <script type="module">
    import { applyTheme } from "./js/theme.js";
    import { buildShell } from "./js/shell.js";
    import { loadManifest } from "./js/content-loader.js";
    import { exportProgress, importProgress, resetAll, getTopicState } from "./js/progress-store.js";
    import { reviewStatus } from "./js/mastery-model.js";
    import { el } from "./js/app.js";
    applyTheme();

    const { main } = await buildShell({});

    main.appendChild(el("h1", {}, "Train the math the real world actually uses."));
    main.appendChild(el("p", { class: "lede" },
      "Pick a subject in the sidebar, choose a topic, and master it for real — " +
      "every topic leads with where the math shows up in real life, then drills you " +
      "with fresh problems until each underlying skill is genuinely solid."));

    main.appendChild(el("div", { style: "margin-top: var(--space-3)" },
      el("a", { class: "btn", href: "placement.html" }, "Take the placement quiz →")));

    // --- Progress dashboard (shown once there's any saved progress) ---
    const bar = (pct) => el("div", { class: "dash-bar" }, el("div", { class: "dash-bar-fill", style: `width:${pct}%` }));
    const dashStat = (big, label) => el("div", { class: "dash-stat" },
      [el("div", { class: "dash-stat-num" }, big), el("div", { class: "dash-stat-label" }, label)]);
    const conceptFrac = (state) => {
      const cs = state && state.concepts ? Object.values(state.concepts) : [];
      const done = cs.filter((c) => c.mastered).length;
      const total = (state && state.conceptOrder && state.conceptOrder.length) || cs.length;
      return { done, total, pct: total ? Math.round((100 * done) / total) : 0 };
    };
    try {
      const manifest = await loadManifest();
      const allTopics = manifest.subjects.flatMap((s) => s.topics.map((t) => ({ t, subject: s, state: getTopicState(t.id) })));
      const masteredCount = allTopics.filter((x) => x.state && x.state.topicMastered).length;
      const totalAnswered = allTopics.reduce((n, x) => n + ((x.state && x.state.totalAnswered) || 0), 0);
      if (totalAnswered > 0) {
        const overall = Math.round((100 * masteredCount) / allTopics.length);
        const dash = el("section", { class: "card dash", style: "margin-top: var(--space-4)" }, [
          el("h3", { style: "margin-top:0" }, "Your progress"),
          el("div", { class: "dash-stats" }, [
            dashStat(`${masteredCount} / ${allTopics.length}`, "topics mastered"),
            dashStat(String(totalAnswered), "problems answered"),
            dashStat(`${overall}%`, "of the catalog"),
          ]),
          bar(overall),
        ]);
        // Mastered topics whose spaced-repetition retention check has come due.
        const due = allTopics.filter((x) => reviewStatus(x.state).due);
        if (due.length) {
          dash.appendChild(el("h4", {}, "Due for review — keep it sharp"));
          const dueList = el("div", { class: "dash-continue" });
          for (const x of due.slice(0, 6)) {
            dueList.appendChild(el("a", { class: "dash-item", href: `train.html?id=${encodeURIComponent(x.t.id)}` }, [
              el("span", { class: "dash-item-title" }, x.t.title),
              el("span", { class: "dash-item-sub" }, "retention check"),
              bar(100),
            ]));
          }
          dash.appendChild(dueList);
        }
        const inProgress = allTopics.filter((x) => x.state && x.state.totalAnswered > 0 && !x.state.topicMastered);
        if (inProgress.length) {
          dash.appendChild(el("h4", {}, "Continue where you left off"));
          const list = el("div", { class: "dash-continue" });
          for (const x of inProgress.slice(0, 6)) {
            const f = conceptFrac(x.state);
            list.appendChild(el("a", { class: "dash-item", href: `train.html?id=${encodeURIComponent(x.t.id)}` }, [
              el("span", { class: "dash-item-title" }, x.t.title),
              el("span", { class: "dash-item-sub" }, `${f.done}/${f.total} skills`),
              bar(f.pct),
            ]));
          }
          dash.appendChild(list);
        }
        dash.appendChild(el("h4", {}, "By subject"));
        const subs = el("div", { class: "dash-subjects" });
        for (const s of manifest.subjects) {
          const states = s.topics.map((t) => getTopicState(t.id));
          const m = states.filter((st) => st && st.topicMastered).length;
          const pct = s.topics.length ? Math.round((100 * m) / s.topics.length) : 0;
          subs.appendChild(el("a", { class: "dash-subject", href: `subject.html?id=${encodeURIComponent(s.id)}` }, [
            el("span", { class: "dash-subject-name" }, s.title),
            el("span", { class: "dash-subject-count" }, `${m}/${s.topics.length}`),
            bar(pct),
          ]));
        }
        dash.appendChild(subs);
        main.appendChild(dash);
      }
    } catch (e) { /* dashboard is best-effort; the rest of the page still works */ }

    const start = el("div", { class: "card", style: "margin-top: var(--space-4)" }, [
      el("h3", { style: "margin-top:0" }, "How it works"),
      el("ul", {}, [
        el("li", { html: "<strong>Browse</strong> — expand a subject in the sidebar to see its topics." }),
        el("li", { html: "<strong>Learn</strong> — each topic opens with an applied lecture and real-world uses." }),
        el("li", { html: "<strong>Train</strong> — the adaptive engine serves step-by-step problems and keeps drilling your weak spots until you've mastered every skill." }),
      ]),
    ]);
    main.appendChild(start);

    // Progress data controls
    const msg = el("span", { class: "footer-note", role: "status", "aria-live": "polite", style: "margin:0" }, "");
    const setMsg = (t, ok = true) => { msg.textContent = t; msg.style.color = ok ? "var(--success)" : "var(--error)"; };
    const fileInput = el("input", { type: "file", accept: "application/json", style: "display:none" });

    const exportBtn = el("button", { class: "btn secondary" }, "Export progress");
    const importBtn = el("button", { class: "btn secondary" }, "Import progress");
    const resetBtn = el("button", { class: "btn ghost" }, "Reset all");

    exportBtn.addEventListener("click", () => {
      const blob = new Blob([exportProgress()], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = el("a", { href: url, download: "mathgym-progress.json" });
      document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      setMsg("Progress exported.");
    });
    importBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", async () => {
      const f = fileInput.files[0]; if (!f) return;
      try { importProgress(await f.text()); setMsg("Imported. Reloading…"); setTimeout(() => location.reload(), 600); }
      catch (e) { setMsg(`Import failed: ${e.message}`, false); }
      fileInput.value = "";
    });
    resetBtn.addEventListener("click", () => {
      if (confirm("Erase ALL saved progress across every topic? This cannot be undone.")) {
        resetAll(); setMsg("Progress reset. Reloading…"); setTimeout(() => location.reload(), 600);
      }
    });

    main.appendChild(el("section", { class: "card", style: "margin-top: var(--space-3)" }, [
      el("h3", { style: "margin-top:0" }, "Your progress"),
      el("p", { class: "blurb", style: "color: var(--text-dim)" },
        "Saved in this browser only. Export to back it up or move devices; importing replaces what's here."),
      el("div", { style: "display:flex; gap: var(--space-2); flex-wrap: wrap; align-items:center" },
        [exportBtn, importBtn, resetBtn, fileInput, msg]),
    ]));
  </script>
</body>
</html>
