<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="MathGym — Train the math the real world actually uses.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#040a04"/>
      <stop offset="1" stop-color="#020602"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#00ff41" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#00ff41" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#14361a" stroke-width="1" stroke-opacity="0.55"/>
    </pattern>
  </defs>

  <!-- Background + subtle terminal grid motif -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="16" y="16" width="1168" height="598" fill="none" stroke="#1f7a32" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Terminal prompt line -->
  <text x="88" y="150" font-family="'Cascadia Mono','Consolas','Courier New',monospace" font-size="30" fill="#1aa642">
    <tspan fill="#00ff41">&#8250;</tspan> ~/mathgym <tspan fill="#00ff41">$</tspan> train
  </text>

  <!-- Wordmark: Math (green text) + Gym (bright accent) -->
  <text x="84" y="360" font-family="'Cascadia Mono','Consolas','Courier New',monospace" font-size="168" font-weight="700" letter-spacing="-2">
    <tspan fill="#2bdd5a">Math</tspan><tspan fill="#00ff41">Gym</tspan><tspan fill="#00ff41" opacity="0.9">_</tspan>
  </text>

  <!-- Tagline -->
  <text x="88" y="452" font-family="'Cascadia Mono','Consolas','Courier New',monospace" font-size="40" fill="#2bdd5a">Train the math the real world actually uses.</text>

  <!-- Sub-line -->
  <text x="88" y="520" font-family="'Cascadia Mono','Consolas','Courier New',monospace" font-size="26" fill="#1aa642">Adaptive, mastery-based drills &#183; 12 subjects &#183; algebra &#8594; cryptography</text>

  <!-- URL chip -->
  <text x="88" y="580" font-family="'Cascadia Mono','Consolas','Courier New',monospace" font-size="24" fill="#ffb000">mathgym.io</text>
</svg>
