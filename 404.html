<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>try { document.documentElement.setAttribute("data-theme", localStorage.getItem("mathgym.theme") || "terminal"); } catch (e) {}</script>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <title>MathGym — 404: page not found</title>
  <meta name="description" content="That page couldn't be found on MathGym. Head back to the subjects and keep training." />
  <meta name="theme-color" content="#020602" />
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="vendor/katex/katex.min.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
  <main class="container" style="min-height: 70vh; display:flex; align-items:center; justify-content:center; text-align:center;">
    <div style="max-width: 560px;">
      <h1 style="color: var(--error); margin-bottom: var(--space-3);">404 — page not found</h1>
      <p class="lede">This path doesn't compute. The page you were after isn't here — maybe the link was stale, or the URL got mistyped.</p>
      <p class="blurb" style="color: var(--text-dim); margin-bottom: var(--space-4);">No progress lost. Everything you've trained is safe in this browser.</p>
      <p><a class="btn" href="/">Back to subjects</a></p>
    </div>
  </main>
</body>
</html>
